maintext: "[Crossref](https://www.crossref.org/community) is an open scholarly infrastructure supporting the discovery, assessment, and reuse of all kinds of research objects. With over 24,000 members across 166 countries and ~180 million DOI records representing more than 90% of all DOI usage, Crossref is the DOI registration agency most relied upon by the global research community. Members contribute to the Research Nexus — an open network of relationships connecting research organisations, people, outputs, and actions that can be built on forever, for the benefit of society."
